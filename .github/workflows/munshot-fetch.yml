name: munshot-fetch

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: Stock ticker (stock_ticker)
        required: true
        default: JIOFIN
      company:
        description: Company name (stock_company_name / context_company_name)
        required: true
        default: Jio Financial Services Ltd.

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch MUNS agent sample
        env:
          MUNS_TOKEN: ${{ secrets.MUNS_TOKEN }}
          TICKER: ${{ inputs.ticker }}
          COMPANY: ${{ inputs.company }}
        run: |
          set -euo pipefail
          mkdir -p munshot-outputs
          TODAY=$(date -u +%F)
          jq -n \
            --arg ticker "$TICKER" \
            --arg company "$COMPANY" \
            --arg today "$TODAY" \
            '{
              agent_library_id: "613aa071-2079-40a8-bf9f-f9f8af448c20",
              metadata: {
                stock_ticker: $ticker,
                stock_company_name: $company,
                context_company_name: $company,
                stock_country: "INDIA",
                to_date: $today,
                timezone: "UTC"
              }
            }' > payload.json

          curl -i -sS -X POST https://devde.muns.io/agents/run \
            -H "Authorization: Bearer $MUNS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @payload.json \
            > munshot-outputs/agent-613aa071-2079-40a8-bf9f-f9f8af448c20.txt

          rm -f payload.json

          head -1 munshot-outputs/agent-613aa071-2079-40a8-bf9f-f9f8af448c20.txt | grep -E "HTTP/[12](\.[01])? 2[0-9]{2}" \
            || { echo "::error::Non-2xx response from MUNS"; tail -n 80 munshot-outputs/agent-613aa071-2079-40a8-bf9f-f9f8af448c20.txt; exit 1; }

      - name: Commit captured sample
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add munshot-outputs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "munshot: capture sample"
          git push origin HEAD:${{ github.ref_name }}
